<ion-header>
  <ion-toolbar color="primary">
    <ion-title>about</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="$manifest | async as manifest">
    <ion-list-header>Package.json</ion-list-header>
    <ion-item>
      <ion-label>Name</ion-label>
      <ion-note slot="end">{{manifest.name}}</ion-note>
    </ion-item>
    <ion-item>
      <ion-label>Version</ion-label>
      <ion-note slot="end">{{manifest.version}}</ion-note>
    </ion-item>
    <ion-item-divider>Dependencies</ion-item-divider>
    <ion-item *ngFor="let dep of manifest.dependencies | keyvalue">
      <ion-label>{{dep.key}}</ion-label>
      <ion-note slot="end">{{dep.value}}</ion-note>
    </ion-item>
    <ion-item-divider>Dev Dependencies</ion-item-divider>
    <ion-item *ngFor="let dep of manifest.devDependencies | keyvalue">
      <ion-label>{{dep.key}}</ion-label>
      <ion-note slot="end">{{dep.value}}</ion-note>
    </ion-item>
  </ion-list>
</ion-content>
